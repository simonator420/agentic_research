[pytest]
# Suppress noisy-but-benign RuntimeWarnings from sklearn's internal euclidean-
# distance computation (extmath.py safe_sparse_dot).  These arise from the
# algebraic shortcut  ||x-y||^2 = ||x||^2 + ||y||^2 - 2·x^T·y  which can
# overflow or divide-by-zero in intermediate steps even on valid data; sklearn
# handles the resulting NaN internally and the final scores are correct.
# They cannot be caught via -W error because sklearn's CV helpers wrap them in
# their own warnings.catch_warnings() context.
filterwarnings =
    ignore::RuntimeWarning:sklearn.utils.extmath
    ignore::RuntimeWarning:sklearn.metrics.pairwise
